name: Auto Build iVentoy Docker Image

on:
  schedule:
    - cron: '0 2 * * 1' # 每周一凌晨 2:00 运行 (UTC时间)
  workflow_dispatch: # 允许在 Actions 页面手动点击运行

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/iventoy

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取原仓库最新版本号
        id: get_version
        run: |
          # 调用 GitHub API 获取最新 Release
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/ventoy/PXE/releases/latest)
          # 提取 tag 名称 (例如 "v1.0.20"，并去掉 'v' 前缀)
          VERSION=$(echo "$LATEST_RELEASE" | jq -r .tag_name | sed 's/^v//')
          echo "获取到的最新版本为: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 检查 Docker Hub 是否已有该版本
        id: check_image
        run: |
          # 查询 Docker Hub API 确认 tag 是否已存在
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/${{ env.VERSION }}/)
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "版本 ${{ env.VERSION }} 的镜像已存在，跳过构建。"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "未找到版本 ${{ env.VERSION }} 的镜像，开始构建..."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: 设置 QEMU (支持多架构构建)
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: 登录到 Docker Hub
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: 构建并推送到 Docker Hub
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 可以同时打包 amd64 和 arm64，前提是 iVentoy 官方有提供对应的包，这里以默认 linux-free (amd64) 为例
          platforms: linux/amd64 
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          build-args: |
            IVENTOY_VERSION=${{ env.VERSION }}
